<!DOCTYPE html>
<html>
<head>
  <title>GemGrade AI</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      padding: 40px;
    }

    .box {
      background: #1c1c1c;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
    }

    input, button {
      margin: 10px;
      padding: 10px;
      width: 80%;
    }

    button {
      background: gold;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>
<body>

<h1>💎 GemGrade AI</h1>

<div class="box">

  <input type="file" id="frontImage">
  <input type="file" id="backImage">

  <h3>Front</h3>
<input type="number" id="edgesFront" placeholder="Edges Front" step="0.5">
<input type="number" id="cornersFront" placeholder="Corners Front" step="0.5">
<input type="number" id="surfaceFront" placeholder="Surface Front" step="0.5">
<input type="number" id="centeringFront" placeholder="Centering Front" step="0.5">

<h3>Back</h3>
<input type="number" id="edgesBack" placeholder="Edges Back" step="0.5">
<input type="number" id="cornersBack" placeholder="Corners Back" step="0.5">
<input type="number" id="surfaceBack" placeholder="Surface Back" step="0.5">
<input type="number" id="centeringBack" placeholder="Centering Back" step="0.5">

  <button onclick="gradeCard()">Grade Card</button>

  <div class="result" id="result"></div>
</div>

<script>
function gradeCard() {

  const edges = (
    parseFloat(document.getElementById('edgesFront').value) +
    parseFloat(document.getElementById('edgesBack').value)
  ) / 2;

  const corners = (
    parseFloat(document.getElementById('cornersFront').value) +
    parseFloat(document.getElementById('cornersBack').value)
  ) / 2;

  const surface = (
    parseFloat(document.getElementById('surfaceFront').value) +
    parseFloat(document.getElementById('surfaceBack').value)
  ) / 2;

  const centering = (
    parseFloat(document.getElementById('centeringFront').value) +
    parseFloat(document.getElementById('centeringBack').value)
  ) / 2;

  fetch(`/api/grade?edges=${edges}&corners=${corners}&surface=${surface}&centering=${centering}`)
    .then(res => res.json())
    .then(data => {
      document.getElementById('result').innerHTML =
        "Final Grade: " + data.finalGrade;
    });

}
</script>

</body>
</html>
