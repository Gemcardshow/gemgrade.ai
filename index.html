<!DOCTYPE html>
<html>
<head>
  <title>GemGrade AI</title>
  <style>
    body { font-family: Arial; background:#111; color:white; text-align:center; padding:40px; }
    .box { background:#1c1c1c; padding:20px; border-radius:10px; max-width:500px; margin:auto; }
    input, button { margin:10px; padding:10px; width:80%; }
    button { background:gold; border:none; font-weight:bold; cursor:pointer; }
    .result { margin-top:20px; font-size:16px; text-align:left; white-space:pre-wrap; }
  </style>
</head>
<body>

<h1>💎 GemGrade AI</h1>

<div class="box">
  <p>Upload front and back of your card.</p>

  <label>Front Image</label>
  <input type="file" id="frontImage" accept="image/*">

  <label>Back Image</label>
  <input type="file" id="backImage" accept="image/*">

  <button onclick="gradeCard()">Grade Card</button>

  <div class="result" id="result"></div>
</div>

<script>
function resizeImage(file, maxWidth = 900, quality = 0.75) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => {
      img.src = e.target.result;
    };

    img.onload = () => {
      const canvas = document.createElement("canvas");
      const scale = Math.min(maxWidth / img.width, 1);

      canvas.width = img.width * scale;
      canvas.height = img.height * scale;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      resolve(canvas.toDataURL("image/jpeg", quality));
    };

    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function gradeCard() {
  const resultDiv = document.getElementById("result");
  const front = document.getElementById("frontImage").files[0];
  const back = document.getElementById("backImage").files[0];

  if (!front || !back) {
    resultDiv.innerText = "Please upload both front and back images.";
    return;
  }

  resultDiv.innerText = "Analyzing card...";

  try {
    const frontBase64 = await resizeImage(front);
    const backBase64 = await resizeImage(back);

    const res = await fetch("/api/grade", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        frontImage: frontBase64,
        backImage: backBase64
      })
    });

    const data = await res.json();

    if (data.result) {
      resultDiv.innerText = data.result;
    } else {
      resultDiv.innerText = data.error || "Error grading card.";
    }
  } catch (err) {
    resultDiv.innerText = "Error: " + err.message;
  }
}
</script>

</body>
</html>
