<!DOCTYPE html>
<html>
<head>
  <title>GemGrade AI</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      padding: 40px;
    }

    .box {
      background: #1c1c1c;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
    }

    input, button {
      margin: 10px;
      padding: 10px;
      width: 80%;
    }

    button {
      background: gold;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>
<body>

<h1>💎 GemGrade AI</h1>

<div class="box">

  <input type="file" id="frontImage">
  <input type="file" id="backImage">

  <input type="number" id="edges" placeholder="Edges (1-10)" step="0.5">
  <input type="number" id="corners" placeholder="Corners (1-10)" step="0.5">
  <input type="number" id="surface" placeholder="Surface (1-10)" step="0.5">
  <input type="number" id="centering" placeholder="Centering (1-10)" step="0.5">

  <button onclick="gradeCard()">Grade Card</button>

  <div class="result" id="result"></div>
</div>

<script>
function gradeCard() {

  const edges = document.getElementById('edges').value;
  const corners = document.getElementById('corners').value;
  const surface = document.getElementById('surface').value;
  const centering = document.getElementById('centering').value;

  fetch(`/api/grade?edges=${edges}&corners=${corners}&surface=${surface}&centering=${centering}`)
    .then(res => res.json())
    .then(data => {
      document.getElementById('result').innerHTML =
        "Final Grade: " + data.finalGrade;
    });

}
</script>

</body>
</html>
